<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - Antigravity Phone Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #121214;
            --input-bg: #1c1c1e;
            --primary: #4285f4;
            --border: #27272a;
            --text: #ffffff;
            --text-muted: #71717a;
            --error-bg: rgba(244, 63, 94, 0.1);
            --error-text: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            padding: 2.25rem 2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
            font-size: 15px;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary);
            background: #242426;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            font-size: 15px;
            letter-spacing: 0.02em;
        }

        button:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: var(--error-text);
            font-size: 13px;
            margin-top: 1.25rem;
            display: none;
            padding: 12px;
            background: var(--error-bg);
            border: 1px solid rgba(244, 63, 94, 0.15);
            border-radius: 6px;
            text-align: left;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Antigravity</h1>
        <p>Access session from mobile network</p>
        <div class="input-group">
            <input type="password" id="password" placeholder="Enter session passcode" autofocus autocomplete="current-password">
        </div>
        <button id="loginBtn">Connect Securely</button>
        <div class="error" id="error">Incorrect passcode. Please try again.</div>
    </div>
    <script>
        const btn = document.getElementById('loginBtn');
        const input = document.getElementById('password');
        const error = document.getElementById('error');

        async function doLogin() {
            const password = input.value;
            if (!password) return;

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            error.style.display = 'none';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Connect Securely';
                }
            } catch (e) {
                error.textContent = 'Connection failed. Is the server running?';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Connect Securely';
            }
        }

        btn.onclick = doLogin;
        input.onkeypress = (e) => {
            if (e.key === 'Enter') doLogin();
        };
    </script>
</body>

</html>
